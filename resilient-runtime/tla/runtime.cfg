\* RES-3930 Phase B2 -- small-bound model per Q5's size-bucket
\* precedent (2-3 actors, mailbox depth 2).

SPECIFICATION Spec

CONSTANTS
    p1 = p1
    p2 = p2
    p3 = p3
    Msgs = {m1, m2}
    MaxMailboxDepth = 2
    MaxRestarts = 1
    MaxSends = 4
    MaxCrashes = 3

INVARIANT TypeOK
INVARIANT ActorPartition
INVARIANT MailboxBound
INVARIANT NoLostMessages
INVARIANT DeadlockDetectorSound
INVARIANT DeadlockFreedom

PROPERTY RestartConverges
PROPERTY CrashIsolation

\* Actors legitimately reach terminal-ish states (e.g. all Transient
\* actors dropped, mailboxes empty) that TLC's default stuck-state
\* check would otherwise flag as a "deadlock" -- that's a different
\* notion than this spec's own Deadlock predicates above, so the
\* built-in check is disabled here.
CHECK_DEADLOCK FALSE
