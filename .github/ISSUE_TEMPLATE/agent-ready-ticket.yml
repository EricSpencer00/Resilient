name: Agent-Ready Ticket
description: A well-scoped task structured for autonomous AI agents (or humans) to pick up and implement
labels: ["enhancement", "ticket", "agent-ready"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for new work items. The more specific the acceptance criteria, the easier it is for an agent to pick up and implement correctly.
  - type: input
    id: ticket-id
    attributes:
      label: Ticket ID
      description: Next RES-NNN number (check existing issues for the current max)
      placeholder: "RES-NNN"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should exist or work after this ticket is done? One paragraph.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this work?
      options:
        - P0 — blocks shipping or safety
        - P1 — high leverage
        - P2 — standard
        - P3 — backlog / nice to have
    validations:
      required: true
  - type: input
    id: roadmap-goal
    attributes:
      label: Roadmap goal
      description: Which current ROADMAP.md goal or milestone does this serve? Use `G#` when applicable, or `Infra / tooling` for work that does not map cleanly to a goalpost.
      placeholder: "G7 — Real type checker"
    validations:
      required: true
  - type: textarea
    id: files-to-touch
    attributes:
      label: Files / modules to touch
      description: List the files or modules an implementor should read and modify
      placeholder: |
        - resilient/src/main.rs — add CLI subcommand
        - resilient/tests/foo_smoke.rs — add integration test
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Concrete pass/fail checks. Each item should be verifiable by running a command or reading code.
      placeholder: |
        - [ ] `cargo test foo_` passes
        - [ ] `resilient foo --help` prints usage to stdout and exits 0
        - [ ] No new clippy warnings
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: Explicitly name things NOT to do in this ticket
