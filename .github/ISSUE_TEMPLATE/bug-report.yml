name: Bug Report
description: Something is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Write this Resilient program: ...
        2. Run: resilient foo.rz
        3. Expected: ...
        4. Got: ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 14 / Ubuntu 24.04
        - Rust: 1.78.0
        - resilient version: main @ abc1234
  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Logs, backtrace, related issues
