name: AI Threats + Strict Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `ready_for_review` so the AI-threat gate deferred while the PR was
    # a draft runs for real the moment it is marked ready.
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect skippable change
    runs-on: ubuntu-latest
    outputs:
      run_heavy: ${{ steps.filter.outputs.run_heavy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether the heavy gate should run
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          # Draft PRs and docs-only PRs defer the AI-threat integration
          # tests. A draft re-runs them on `ready_for_review`; this is not
          # a required check, so skipping the whole job while draft is safe.
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "draft PR — heavy gate deferred until ready_for_review"
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          non_docs="$(git diff --name-only "$base" "$head" \
            | grep -Ev '^(docs/|.*\.md$|\.github/ISSUE_TEMPLATE/)' || true)"
          if [[ -z "$non_docs" ]]; then
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi

  ai_threat_tests:
    name: AI threat integration tests
    needs: [changes]
    if: needs.changes.outputs.run_heavy == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient

      - name: cargo test (ai_threats_smoke)
        run: cargo test --locked --test it ai_threats_smoke --verbose
