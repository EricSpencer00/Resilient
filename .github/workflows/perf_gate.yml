# RES-202: fib(25) perf-gate. Runs the benchmark on PR + push to
# main, compares medians to the committed baseline
# (benchmarks/baseline/fib.json), and posts a PR comment summarising
# the deltas. Exceeding the threshold (default 15%, override via
# `PERF_THRESHOLD_PCT`) fails the workflow.
#
# RES-3933 (F-E4): the gate no longer measures fib(25) alone. The
# same job now also runs `benchmarks/extended/run.sh`, which covers
# the sum/vm/jit/contracts benchmark dirs (see that script's header
# for exactly which rows and why lex/compile_time are deliberately
# excluded as too slow for CI) and compares against
# `benchmarks/baseline/extended.json` via
# `benchmarks/extended/compare.sh`. Both comparisons reuse the same
# release + `--features jit` binaries the fib step already builds,
# so this adds ~seconds of wall time, not another full compile.
#
# Per the ticket Notes, the gate is a VISIBLE WARNING, not a
# required check — branch-protection can opt in separately. The
# workflow's `fail-fast: false` on its single job keeps PRs
# mergeable while the signal is noisy (hosted-runner variance). The
# extended comparison is advisory for the same reason: the "Compare
# vs baselines" step still exits non-zero when either comparison
# regresses (so the job goes red — visible signal), it's just never
# added to required-status-checks, so it can't block auto-merge.

name: perf-gate

on:
  pull_request:
    # `ready_for_review` so the deferred benchmark runs when a draft is
    # marked ready.
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "resilient/src/**"
      - "resilient/Cargo.toml"
      - "resilient/Cargo.lock"
      - "benchmarks/**"
      - "scripts/compare_perf.sh"
      - ".github/workflows/perf_gate.yml"
  push:
    branches:
      - main
    paths:
      - "resilient/src/**"
      - "resilient/Cargo.toml"
      - "resilient/Cargo.lock"
      - "benchmarks/**"

# Cancel superseded benchmark runs — `cargo bench` is expensive and a
# rebased or re-pushed PR makes the in-flight run obsolete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Threshold percent: fail if any median is >THIS% slower than
  # baseline. Per-backend overrides because the JIT has higher
  # hosted-runner variance (LLVM codegen + first-call cost). See
  # issue #387 for the spurious-failure history that motivated the
  # split.
  PERF_THRESHOLD_PCT: "15"
  PERF_THRESHOLD_PCT_JIT: "30"

jobs:
  fib:
    name: perf-gate benchmarks
    # Defer the benchmark while the PR is a draft; it re-runs on
    # `ready_for_review`. Not a required check, so a deferred draft run
    # blocks nothing.
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            resilient/target
          key: perf-gate-${{ hashFiles('resilient/Cargo.lock') }}

      - name: Install hyperfine + jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq hyperfine jq bc

      - name: Run fib benchmark
        run: |
          ./benchmarks/fib/run.sh > /tmp/fresh-fib.json 2>/dev/null
          echo "Fresh fib results:"
          cat /tmp/fresh-fib.json

      # RES-3933 (F-E4): reuses the release + `--features jit`
      # binaries the fib step above just built (both live under
      # resilient/target, which this job already builds and caches),
      # so this step's own cost is just the benchmark runs themselves
      # — see benchmarks/extended/run.sh for the time-budget math.
      - name: Run extended benchmarks
        run: |
          ./benchmarks/extended/run.sh > /tmp/fresh-extended.json 2>/dev/null
          echo "Fresh extended results:"
          cat /tmp/fresh-extended.json

      # Both comparisons always run (neither can short-circuit the
      # other), and their combined pass/fail is this step's own exit
      # code — same "capture rc, still build the PR-comment body,
      # exit $rc at the end" shape the original single-benchmark
      # version of this step used, just over two scripts instead of
      # one. The job still goes red on a regression (visible, non-
      # required signal); nothing here suppresses that failure.
      - name: Compare vs baselines
        id: compare
        run: |
          set +e
          ./scripts/compare_perf.sh benchmarks/baseline/fib.json /tmp/fresh-fib.json > /tmp/compare-fib.md
          rc_fib=$?
          ./benchmarks/extended/compare.sh benchmarks/baseline/extended.json /tmp/fresh-extended.json > /tmp/compare-extended.md
          rc_extended=$?
          # Echo both tables so the workflow log shows them too.
          cat /tmp/compare-fib.md
          cat /tmp/compare-extended.md
          # Stash for the PR-comment step.
          {
              echo 'body<<EOT'
              echo "### fib(25) perf-gate"
              echo
              cat /tmp/compare-fib.md
              echo
              echo "Baseline: \`benchmarks/baseline/fib.json\` — to update, run \`scripts/update_perf_baseline.sh\` locally + review the deltas."
              echo
              echo "### extended benchmarks perf-gate"
              echo
              cat /tmp/compare-extended.md
              echo
              echo "Baseline: \`benchmarks/baseline/extended.json\` — regenerate with \`benchmarks/extended/run.sh\` and review the deltas before committing."
              echo "EOT"
          } >> "$GITHUB_OUTPUT"
          if [[ $rc_fib -ne 0 || $rc_extended -ne 0 ]]; then
            exit 1
          fi
          exit 0

      - name: Post / update PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.compare.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = process.env.COMMENT_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            // Look for a prior comment from this action to update
            // instead of accumulating one per push.
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100
            });
            const marker = "### fib(25) perf-gate";
            const prior = comments.data.find(c =>
              c.user && c.user.type === "Bot" && c.body && c.body.includes(marker)
            );
            if (prior) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: prior.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
