# RES-202: fib(25) perf-gate. Runs the benchmark on PR + push to
# main, compares medians to the committed baseline
# (benchmarks/baseline/fib.json), and posts a PR comment summarising
# the deltas. Exceeding the threshold (default 15%, override via
# `PERF_THRESHOLD_PCT`) fails the workflow.
#
# Per the ticket Notes, the gate is a VISIBLE WARNING, not a
# required check — branch-protection can opt in separately. The
# workflow's `fail-fast: false` on its single job keeps PRs
# mergeable while the signal is noisy (hosted-runner variance).

name: perf-gate

on:
  pull_request:
    paths:
      - "resilient/src/**"
      - "resilient/Cargo.toml"
      - "resilient/Cargo.lock"
      - "benchmarks/**"
      - "scripts/compare_perf.sh"
      - ".github/workflows/perf_gate.yml"
  push:
    branches:
      - main
    paths:
      - "resilient/src/**"
      - "resilient/Cargo.toml"
      - "resilient/Cargo.lock"
      - "benchmarks/**"

env:
  # Threshold percent: fail if any median is >THIS% slower than
  # baseline. Tighten once hosted-runner variance is characterized.
  PERF_THRESHOLD_PCT: "15"

jobs:
  fib:
    name: fib(25) medians
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            resilient/target
          key: perf-gate-${{ hashFiles('resilient/Cargo.lock') }}

      - name: Install hyperfine + jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq hyperfine jq bc

      - name: Run fib benchmark
        run: |
          ./benchmarks/fib/run.sh > /tmp/fresh.json 2>/dev/null
          echo "Fresh results:"
          cat /tmp/fresh.json

      - name: Compare vs baseline
        id: compare
        run: |
          set +e
          ./scripts/compare_perf.sh benchmarks/baseline/fib.json /tmp/fresh.json > /tmp/compare.md
          rc=$?
          # Echo the markdown table so the workflow log shows it too.
          cat /tmp/compare.md
          # Stash for the PR-comment step.
          {
              echo 'body<<EOT'
              echo "### fib(25) perf-gate"
              echo
              cat /tmp/compare.md
              echo
              echo "Baseline: \`benchmarks/baseline/fib.json\` — to update, run \`scripts/update_perf_baseline.sh\` locally + review the deltas."
              echo "EOT"
          } >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Post / update PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.compare.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = process.env.COMMENT_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            // Look for a prior comment from this action to update
            // instead of accumulating one per push.
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100
            });
            const marker = "### fib(25) perf-gate";
            const prior = comments.data.find(c =>
              c.user && c.user.type === "Bot" && c.body && c.body.includes(marker)
            );
            if (prior) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: prior.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
