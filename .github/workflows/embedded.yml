# RES-176: embedded cross-compile CI. Two jobs, one per target
# class. Each installs the target via rustup and runs the
# matching `scripts/build_*.sh` so the gate stays a single source
# of truth — if someone runs the script locally, they see the
# same commands CI does.
#
# No QEMU runners here; these are build gates, not runtime
# exercises. A runtime job would need per-target QEMU and is
# out of scope for this ticket.

name: embedded

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `ready_for_review` so the cross-compile gate deferred while the PR
    # was a draft runs for real the moment it is marked ready.
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect skippable change
    runs-on: ubuntu-latest
    outputs:
      run_heavy: ${{ steps.filter.outputs.run_heavy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether the heavy gate should run
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          # Draft PRs and docs-only PRs defer the cross-compile gates.
          # A draft re-runs them for real on `ready_for_review`; the jobs
          # report success (skipped steps) meanwhile, and auto-merge only
          # fires once a PR is non-draft anyway.
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "draft PR — heavy gate deferred until ready_for_review"
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          non_docs="$(git diff --name-only "$base" "$head" \
            | grep -Ev '^(docs/|.*\.md$|\.github/ISSUE_TEMPLATE/)' || true)"
          if [[ -z "$non_docs" ]]; then
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi

  cortex_m:
    name: resilient-runtime-cortex-m-demo (thumbv7em-none-eabihf)
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deferred gate fast path
        if: needs.changes.outputs.run_heavy != 'true'
        run: echo "docs-only or draft PR; Cortex-M demo cross-compile not needed"

      - name: Install Rust toolchain
        if: needs.changes.outputs.run_heavy == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
          targets: thumbv7em-none-eabihf

      # RES-1198: rust-aware cache strips incremental compilation artifacts
      # before saving (smaller cache, faster restore) and keys off
      # Cargo.lock + Cargo.toml + rustc version + feature set
      # automatically. Matches the caching strategy ci.yml's
      # `default_ci` / `z3_ci` / `feature_matrix` jobs already use.
      - name: Cache cargo
        if: needs.changes.outputs.run_heavy == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient-runtime-cortex-m-demo
          key: cortex-m

      - name: build_cortex_m_demo.sh
        if: needs.changes.outputs.run_heavy == 'true'
        run: scripts/build_cortex_m_demo.sh

  riscv32:
    name: resilient-runtime (riscv32imac-unknown-none-elf)
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deferred gate fast path
        if: needs.changes.outputs.run_heavy != 'true'
        run: echo "docs-only or draft PR; RISC-V cross-compile not needed"

      - name: Install Rust toolchain
        if: needs.changes.outputs.run_heavy == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
          targets: riscv32imac-unknown-none-elf

      # RES-1198: see notes on cortex_m above — rust-cache strips
      # incremental compilation artifacts and uses a richer key than
      # raw `hashFiles('Cargo.lock')`.
      - name: Cache cargo
        if: needs.changes.outputs.run_heavy == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient-runtime
          key: riscv32

      - name: build_riscv32.sh
        if: needs.changes.outputs.run_heavy == 'true'
        run: scripts/build_riscv32.sh

  cortex_m0:
    name: resilient-runtime (thumbv6m-none-eabi)
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deferred gate fast path
        if: needs.changes.outputs.run_heavy != 'true'
        run: echo "docs-only or draft PR; Cortex-M0 cross-compile not needed"

      - name: Install Rust toolchain
        if: needs.changes.outputs.run_heavy == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
          targets: thumbv6m-none-eabi

      # RES-1198: see notes on cortex_m above — rust-cache strips
      # incremental compilation artifacts and uses a richer key than
      # raw `hashFiles('Cargo.lock')`.
      - name: Cache cargo
        if: needs.changes.outputs.run_heavy == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient-runtime
          key: cortex-m0

      - name: build_cortex_m0.sh
        if: needs.changes.outputs.run_heavy == 'true'
        run: scripts/build_cortex_m0.sh
