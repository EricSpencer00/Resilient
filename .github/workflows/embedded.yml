# RES-176: embedded cross-compile CI. Two jobs, one per target
# class. Each installs the target via rustup and runs the
# matching `scripts/build_*.sh` so the gate stays a single source
# of truth — if someone runs the script locally, they see the
# same commands CI does.
#
# No QEMU runners here; these are build gates, not runtime
# exercises. A runtime job would need per-target QEMU and is
# out of scope for this ticket.

name: embedded

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect docs-only change
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only pull request
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          non_docs="$(git diff --name-only "$base" "$head" \
            | grep -Ev '^(docs/|.*\.md$|\.github/ISSUE_TEMPLATE/)' || true)"
          if [[ -z "$non_docs" ]]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  cortex_m:
    name: resilient-runtime-cortex-m-demo (thumbv7em-none-eabihf)
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docs-only fast path
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "docs-only change; Cortex-M demo cross-compile not needed"

      - name: Install Rust toolchain
        if: needs.changes.outputs.docs_only != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
          targets: thumbv7em-none-eabihf

      - name: Cache cargo
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            resilient-runtime-cortex-m-demo/target
          key: cortex-m-${{ hashFiles('resilient-runtime-cortex-m-demo/Cargo.lock', 'resilient-runtime/Cargo.lock') }}

      - name: build_cortex_m_demo.sh
        if: needs.changes.outputs.docs_only != 'true'
        run: scripts/build_cortex_m_demo.sh

  riscv32:
    name: resilient-runtime (riscv32imac-unknown-none-elf)
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docs-only fast path
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "docs-only change; RISC-V cross-compile not needed"

      - name: Install Rust toolchain
        if: needs.changes.outputs.docs_only != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
          targets: riscv32imac-unknown-none-elf

      - name: Cache cargo
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            resilient-runtime/target
          key: riscv32-${{ hashFiles('resilient-runtime/Cargo.lock') }}

      - name: build_riscv32.sh
        if: needs.changes.outputs.docs_only != 'true'
        run: scripts/build_riscv32.sh

  cortex_m0:
    name: resilient-runtime (thumbv6m-none-eabi)
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docs-only fast path
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "docs-only change; Cortex-M0 cross-compile not needed"

      - name: Install Rust toolchain
        if: needs.changes.outputs.docs_only != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
          targets: thumbv6m-none-eabi

      - name: Cache cargo
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            resilient-runtime/target
          key: cortex-m0-${{ hashFiles('resilient-runtime/Cargo.lock') }}

      - name: build_cortex_m0.sh
        if: needs.changes.outputs.docs_only != 'true'
        run: scripts/build_cortex_m0.sh
