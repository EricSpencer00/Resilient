name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One job per push/PR is enough — cancel in-flight runs on rebase.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect docs-only change
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only pull request
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          non_docs="$(git diff --name-only "$base" "$head" \
            | grep -Ev '^(docs/|.*\.md$|\.github/ISSUE_TEMPLATE/)' || true)"
          if [[ -z "$non_docs" ]]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  default_ci:
    name: build / test / clippy
    needs: [changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    steps:
      - uses: actions/checkout@v4

      - name: Docs-only fast path
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "docs-only change; Rust build/test/clippy gate not needed"

      - name: Install Rust toolchain
        if: needs.changes.outputs.docs_only != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        if: needs.changes.outputs.docs_only != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient

      - name: cargo build
        if: needs.changes.outputs.docs_only != 'true'
        run: cargo build --locked --verbose

      - name: cargo clippy
        if: needs.changes.outputs.docs_only != 'true'
        run: cargo clippy --locked -- -D warnings

      - name: cargo test
        if: needs.changes.outputs.docs_only != 'true'
        run: cargo test --locked --verbose

      - name: cargo fmt
        if: needs.changes.outputs.docs_only != 'true'
        run: cargo fmt --check

  z3_ci:
    name: build / test with --features z3
    needs: [changes]
    runs-on: ubuntu-latest
    # RES-918: hard 30-minute cap so a stuck z3 query (or a runaway
    # bindgen / linker cache miss) doesn't wedge the runner for the
    # default 6 hours. Surfaces as a normal CI failure, so auto-merge
    # continues to refuse the PR until the job is fixed.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: resilient
    steps:
      - uses: actions/checkout@v4

      - name: Docs-only fast path
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "docs-only change; z3 gate not needed"

      - name: Install Z3
        if: needs.changes.outputs.docs_only != 'true'
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3 clang

      - name: Install Rust toolchain
        if: needs.changes.outputs.docs_only != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        if: needs.changes.outputs.docs_only != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient
          key: z3

      - name: cargo build
        if: needs.changes.outputs.docs_only != 'true'
        run: cargo build --locked --features z3 --verbose

      - name: cargo test
        if: needs.changes.outputs.docs_only != 'true'
        run: cargo test --locked --features z3 --verbose
        env:
          # Linux distro paths for bindgen + linker (for z3).
          BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include
          LIBRARY_PATH: /usr/lib/x86_64-linux-gnu

  extra_feature_tests:
    name: test (${{ matrix.features }})
    needs: [changes]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    strategy:
      matrix:
        features: [lsp, jit]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient
          key: test-${{ matrix.features }}

      - name: cargo test
        run: cargo test --locked --features ${{ matrix.features }} --verbose

  board:
    name: board hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each commit references a ticket
        shell: bash
        run: |
          # Only enforce this for merge-commit ranges on PRs; on `main` we
          # just warn.
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
              bad=""
              while read -r sha msg; do
                  # Skip merge commits.
                  if [[ $(git log -1 --pretty=%P "$sha" | wc -w) -gt 1 ]]; then
                      continue
                  fi
                  # Require RES-NNN: prefix.
                  if ! echo "$msg" | grep -qE '^RES-[0-9]+: '; then
                      bad+="$sha $msg"$'\n'
                  fi
              done < <(git log --format='%H %s' "$base..$head")
              if [[ -n "$bad" ]]; then
                  echo "::error::commits without RES-NNN prefix:"
                  echo "$bad"
                  exit 1
              fi
          else
              echo "push to main — skipping commit-message enforcement"
          fi
