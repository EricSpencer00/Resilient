name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One job per push/PR is enough — cancel in-flight runs on rebase.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: build / test / clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient

      - name: cargo build
        run: cargo build --locked --verbose

      - name: cargo test
        run: cargo test --locked --verbose

      - name: cargo clippy
        run: cargo clippy --locked -- -D warnings

      # Optional: check formatting. Non-blocking for now since we haven't
      # committed to a rustfmt style; flip `continue-on-error` off when
      # we do.
      - name: cargo fmt --check
        run: cargo fmt --check
        continue-on-error: true

  z3:
    name: build / test with --features z3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    steps:
      - uses: actions/checkout@v4

      - name: Install Z3 (libz3-dev for bindgen + linker)
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3 clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient
          key: z3

      - name: cargo build --features z3
        run: cargo build --locked --features z3
        env:
          # Linux distro paths for bindgen + linker.
          BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include
          LIBRARY_PATH: /usr/lib/x86_64-linux-gnu

      - name: cargo test --features z3
        run: cargo test --locked --features z3
        env:
          BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include
          LIBRARY_PATH: /usr/lib/x86_64-linux-gnu

  board:
    name: board hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each commit references a ticket
        shell: bash
        run: |
          # Only enforce this for merge-commit ranges on PRs; on `main` we
          # just warn.
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
              bad=""
              while read -r sha msg; do
                  # Skip merge commits.
                  if [[ $(git log -1 --pretty=%P "$sha" | wc -w) -gt 1 ]]; then
                      continue
                  fi
                  # Require RES-NNN: prefix OR MGR: prefix.
                  if ! echo "$msg" | grep -qE '^(RES-[0-9]+|MGR): '; then
                      bad+="$sha $msg"$'\n'
                  fi
              done < <(git log --format='%H %s' "$base..$head")
              if [[ -n "$bad" ]]; then
                  echo "::error::commits without RES-NNN/MGR prefix:"
                  echo "$bad"
                  exit 1
              fi
          else
              echo "push to main — skipping commit-message enforcement"
          fi

      - name: Board sanity (no ticket stuck in IN_PROGRESS)
        shell: bash
        run: |
          # A ticket lingering in IN_PROGRESS across a merge is a signal
          # of unfinished work. Tolerated but called out.
          stuck=$(ls .board/tickets/IN_PROGRESS/*.md 2>/dev/null || true)
          if [[ -n "$stuck" ]]; then
              echo "::warning::ticket(s) in IN_PROGRESS at merge:"
              echo "$stuck"
          fi
