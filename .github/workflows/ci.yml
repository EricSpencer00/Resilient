name: CI

on:
  push:
    branches: [main]
    # RES-398: docs-only changes don't affect Rust build/test/clippy
    # output, so skip the heavy matrix when only docs/markdown change.
    # Anything that touches code (.rs, Cargo.{toml,lock}, src/, tests/,
    # benches/) still runs the full matrix because those paths are not
    # in the ignore list.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'

# One job per push/PR is enough — cancel in-flight runs on rebase.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build / clippy / fmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient

      - name: cargo build
        run: cargo build --locked --verbose

      - name: cargo clippy
        run: cargo clippy --locked -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --check

  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    strategy:
      matrix:
        include:
          - name: 'default'
            features: ''
            z3_install: false
          - name: 'z3'
            features: 'z3'
            z3_install: true
          - name: 'lsp'
            features: 'lsp'
            z3_install: false
          - name: 'jit'
            features: 'jit'
            z3_install: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Z3 (if needed)
        if: ${{ matrix.z3_install }}
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3 clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient
          key: test-${{ matrix.name }}

      - name: cargo test
        run: |
          if [[ -z "${{ matrix.features }}" ]]; then
            cargo test --locked --verbose
          else
            cargo test --locked --features "${{ matrix.features }}" --verbose
          fi
        env:
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.z3_install && '-I/usr/include' || '' }}
          LIBRARY_PATH: ${{ matrix.z3_install && '/usr/lib/x86_64-linux-gnu' || '' }}

  test-result:
    name: test-result
    runs-on: ubuntu-latest
    if: always()
    needs: [test]
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::One or more test shards failed"
            exit 1
          fi

  board:
    name: board hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each commit references a ticket
        shell: bash
        run: |
          # Only enforce this for merge-commit ranges on PRs; on `main` we
          # just warn.
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
              bad=""
              while read -r sha msg; do
                  # Skip merge commits.
                  if [[ $(git log -1 --pretty=%P "$sha" | wc -w) -gt 1 ]]; then
                      continue
                  fi
                  # Require RES-NNN: prefix.
                  if ! echo "$msg" | grep -qE '^RES-[0-9]+: '; then
                      bad+="$sha $msg"$'\n'
                  fi
              done < <(git log --format='%H %s' "$base..$head")
              if [[ -n "$bad" ]]; then
                  echo "::error::commits without RES-NNN prefix:"
                  echo "$bad"
                  exit 1
              fi
          else
              echo "push to main — skipping commit-message enforcement"
          fi
