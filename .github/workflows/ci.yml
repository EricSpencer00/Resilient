name: CI

on:
  push:
    branches: [main]
    # RES-398: docs-only changes don't affect Rust build/test/clippy
    # output, so skip the heavy matrix when only docs/markdown change.
    # Anything that touches code (.rs, Cargo.{toml,lock}, src/, tests/,
    # benches/) still runs the full matrix because those paths are not
    # in the ignore list.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'

# One job per push/PR is enough — cancel in-flight runs on rebase.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: build / test / clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient

      - name: cargo build
        run: cargo build --locked --verbose

      - name: cargo test
        run: cargo test --locked --verbose

      - name: cargo clippy
        run: cargo clippy --locked -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --check

  z3:
    name: build / test with --features z3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resilient
    steps:
      - uses: actions/checkout@v4

      - name: Install Z3 (libz3-dev for bindgen + linker)
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3 clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resilient
          key: z3

      - name: cargo build --features z3
        run: cargo build --locked --features z3
        env:
          # Linux distro paths for bindgen + linker.
          BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include
          LIBRARY_PATH: /usr/lib/x86_64-linux-gnu

      - name: cargo test --features z3
        run: cargo test --locked --features z3
        env:
          BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include
          LIBRARY_PATH: /usr/lib/x86_64-linux-gnu

  board:
    name: board hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each commit references a ticket
        shell: bash
        run: |
          # Only enforce this for merge-commit ranges on PRs; on `main` we
          # just warn.
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
              bad=""
              while read -r sha msg; do
                  # Skip merge commits.
                  if [[ $(git log -1 --pretty=%P "$sha" | wc -w) -gt 1 ]]; then
                      continue
                  fi
                  # Require RES-NNN: prefix.
                  if ! echo "$msg" | grep -qE '^RES-[0-9]+: '; then
                      bad+="$sha $msg"$'\n'
                  fi
              done < <(git log --format='%H %s' "$base..$head")
              if [[ -n "$bad" ]]; then
                  echo "::error::commits without RES-NNN prefix:"
                  echo "$bad"
                  exit 1
              fi
          else
              echo "push to main — skipping commit-message enforcement"
          fi

      - name: Stdlib coverage
        shell: bash
        run: bash agent-scripts/verify-stdlib-coverage.sh
