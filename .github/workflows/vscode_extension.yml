# RES-204: build the VS Code extension + upload the .vsix as a
# release artifact on tag push. Publishing to the Marketplace is
# out of scope — this job just produces the installable bundle.
#
# On every push + PR: compile-only, to catch TypeScript breakage
# early. On a tag push (`v*`): additionally package via `vsce`
# and upload the artifact.

name: vscode-extension

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    paths:
      - "vscode-extension/**"
      - ".github/workflows/vscode_extension.yml"

jobs:
  build:
    name: Type-check + compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check + emit
        run: npm run compile

  package:
    name: Package .vsix
    runs-on: ubuntu-latest
    # Only on tag push — no PR artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Compile
        run: npm run compile

      - name: Package
        run: npx --yes @vscode/vsce package --out resilient-vscode.vsix

      - name: Upload .vsix
        uses: actions/upload-artifact@v4
        with:
          name: resilient-vscode-${{ github.ref_name }}.vsix
          path: vscode-extension/resilient-vscode.vsix
          retention-days: 30
