# RES-204 / RES-3783: build, package, and publish the VS Code extension.
#
# Three jobs, each gating the next:
#   1. `build`   — on every push + PR: type-check + compile only, to
#                  catch TypeScript breakage early. No artifact.
#   2. `package` — on a tag push (`v*`) only: package via `vsce` and
#                  upload the .vsix as a release artifact.
#   3. `publish` — on a tag push (`v*`) only, after `package` succeeds:
#                  publish the packaged extension to the VS Code
#                  Marketplace via `vsce publish`, authenticated with
#                  the `VSCE_PAT` repository secret.
#
# See docs/VSCODE_EXTENSION_RELEASE.md for the release runbook,
# including the current Marketplace-version divergence and how to
# reconcile it.

name: vscode-extension

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    paths:
      - "vscode-extension/**"
      - ".github/workflows/vscode_extension.yml"

permissions:
  contents: read

jobs:
  build:
    name: Type-check + compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check + emit
        run: npm run compile

  package:
    name: Package .vsix
    runs-on: ubuntu-latest
    # Only on tag push — no PR artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Compile
        run: npm run compile

      - name: Package
        run: npx --yes @vscode/vsce package --out resilient-vscode.vsix

      - name: Upload .vsix
        uses: actions/upload-artifact@v4
        with:
          name: resilient-vscode-${{ github.ref_name }}.vsix
          path: vscode-extension/resilient-vscode.vsix
          retention-days: 30

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Compile
        run: npm run compile

      # RES-4102: make publish idempotent. A `v*` tag fires this workflow
      # *and* release.yml; when a compiler re-tag (e.g. a release.yml fix)
      # reuses an extension version already live on the Marketplace, an
      # unconditional `vsce publish` would fail the monotonic-version check
      # and leave a spurious red run even though the extension is already
      # correctly published. This step skips publish in exactly that case.
      # It always exits 0 and only sets `already=true` on an affirmative
      # match, so any query failure falls through to a real publish attempt
      # (preserving the prior behaviour).
      - name: Skip publish if this version is already live
        id: pubcheck
        run: |
          set +e
          VERSION="$(node -p "require('./package.json').version")"
          PUBLISHED="$(npx --yes @vscode/vsce show fromamerica.resilient-vscode --json 2>/dev/null \
            | node -e "try{const d=JSON.parse(require('fs').readFileSync(0,'utf8'));console.log((d.versions||[]).map(v=>v.version).join(' '))}catch(e){}" )"
          echo "package.json version: $VERSION"
          echo "published versions: $PUBLISHED"
          for v in $PUBLISHED; do
            if [ "$v" = "$VERSION" ]; then
              echo "already=true" >> "$GITHUB_OUTPUT"
              echo "Extension $VERSION is already on the Marketplace; skipping publish."
              exit 0
            fi
          done
          echo "already=false" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to VS Code Marketplace
        if: steps.pubcheck.outputs.already != 'true'
        run: npx --yes @vscode/vsce publish --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
