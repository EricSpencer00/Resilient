name: agent-guardrails

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  # Also trigger on push so the guardrail runs even when the PR event
  # dedup'd by GitHub (e.g. a workflow-file-adding commit).
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  guardrails:
    name: diff-shape guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base/head
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=origin/main" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run verify-scope (shape + overlap only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash agent-scripts/verify-scope.sh \
            --base "${{ steps.refs.outputs.base }}" \
            --head "${{ steps.refs.outputs.head }}" \
            --skip tests --skip clippy --skip fmt \
            --report /tmp/report.json || true

      - name: Upload guardrail report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-guardrail-report
          path: /tmp/report.json

      - name: Post guardrail comment (advisory)
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f /tmp/report.json ]; then exit 0; fi
          python3 > /tmp/body.md <<'PYEOF'
          import json, sys
          r = json.load(open("/tmp/report.json"))
          failures = r.get("failures", [])
          if not failures:
              print("✅ Agent guardrails passed — all checks clean.")
              sys.exit(0)
          print("⚠️  Agent guardrails **ADVISORY** — issues found (non-blocking).\n")
          print("**Violations detected:**\n")
          for i, f in enumerate(failures, 1):
              print(f"{i}. {f}")
          print("\n**How to fix locally:**")
          print("```bash")
          print("agent-scripts/verify-scope.sh --skip tests --skip clippy --skip fmt")
          print("```")
          print("\nAddress the violations above, push new commits, and re-run.")
          print("**Note:** These guardrails are *advisory* and do not block auto-merge.")
          PYEOF
          gh pr comment "$PR_NUMBER" --body-file /tmp/body.md || true

  agent-script-tests:
    name: agent-scripts self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # RES-3931: guards the file-claims.json JSON-aware merge in
      # auto-resolve-extensions.sh against regressing to a textual concat
      # that ships invalid JSON. Hermetic (temp dirs only) — hard failure.
      - name: Run agent-scripts self-tests
        run: bash agent-scripts/test-json-merge.sh
