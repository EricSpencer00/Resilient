name: Release file claims on PR close

# RES-3976: claims used to live in agent-scripts/file-claims.json committed
# on `main`, so releasing a branch's claims meant opening a
# "chore: release file claims" PR against `main` and auto-merging it. That
# PR was itself the root cause of the serialization tarpit this fix
# addresses: every one of those merges rewrote file-claims.json on `main`,
# which staled every OTHER open PR that still carried a (now-removed)
# commit touching the same file — `MERGE: DIRTY` even with every required
# check green, needing a manual union-merge resolve + a full CI re-run
# before the queue could move again.
#
# Claims now live on a dedicated `agent-claims` branch (see
# agent-scripts/claims-ref.sh) that no feature branch ever commits to,
# rebases onto, or merges from, and that `main`'s branch protection does
# not cover. `release-claims.sh` releases the closing branch's claims *and*
# sweeps any other claim whose branch no longer exists on the remote, in a
# single compare-and-swap push straight to that ref — no PR, no auto-merge
# dance, and nothing lands on `main` at all.
on:
  pull_request:
    types: [closed]

jobs:
  release-claims:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # Check out `main` (not the closed PR's merge ref) so the scripts we
      # run are always the canonical, current version regardless of what
      # the closing branch itself carried. Full history is no longer
      # needed — release-claims.sh only fetches the agent-claims ref
      # directly, it never diffs against this checkout's own history.
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release claims for closed branch (+ stale sweep)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          set -euo pipefail
          bash agent-scripts/release-claims.sh "$BRANCH" "$PR_NUMBER"

          if [ "$MERGED" != "true" ]; then
            gh pr comment "$PR_NUMBER" --body "This PR was closed without merge. The branch claims were released and the ticket returned to the queue." >/dev/null || true
          fi
