name: Release file claims on merge

on:
  pull_request:
    types: [closed]

jobs:
  release-claims:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release claims for merged branch
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          bash agent-scripts/release-claims.sh "$BRANCH"

      - name: Commit updated claims
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .claude/file-claims.json; then
            echo "No claims to release."
          else
            git add .claude/file-claims.json
            git commit -m "chore: release file claims for ${{ github.event.pull_request.head.ref }}"
            git push
          fi
