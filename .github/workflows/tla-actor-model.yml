# RES-3930 Phase B2: TLC model-check of the actor scheduler spec
# (resilient-runtime/tla/runtime.tla) via the existing `rz tla check`
# bridge (resilient/src/tla_bridge.rs). This is not a new CI mechanism
# -- it reuses the shipped bridge and simply wires it into a job.
#
# Per docs/TLA_ACTOR_MODEL.md's Phase B2 acceptance criteria: gated the
# same way `resilient-runtime-cortex-m-demo` gates on its target
# toolchain -- skip gracefully when `tla2tools.jar` is unavailable so
# an absent jar never blocks merge. tla2tools.jar is an Apache-licensed
# release artifact from https://github.com/tlaplus/tlaplus, fetched
# fresh in-job (no vendored binary in this repo).

name: tla-actor-model

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect skippable change
    runs-on: ubuntu-latest
    outputs:
      run_heavy: ${{ steps.filter.outputs.run_heavy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether the TLA check should run
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "draft PR — TLA check deferred until ready_for_review"
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          relevant="$(git diff --name-only "$base" "$head" \
            | grep -E '^(resilient-runtime/tla/|resilient/src/tla_bridge\.rs|\.github/workflows/tla-actor-model\.yml)' || true)"
          if [[ -z "$relevant" ]]; then
            echo "no TLA-relevant changes; check deferred"
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi

  tla_check:
    name: runtime.tla TLC model check
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deferred check fast path
        if: needs.changes.outputs.run_heavy != 'true'
        run: echo "no TLA-relevant changes, draft PR, or non-PR event; deferred"

      - name: Install Rust toolchain
        if: needs.changes.outputs.run_heavy == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        if: needs.changes.outputs.run_heavy == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            resilient/target
          key: tla-actor-model-${{ hashFiles('resilient/Cargo.lock') }}

      - name: Set up JDK
        if: needs.changes.outputs.run_heavy == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Fetch tla2tools.jar (skip gracefully if unavailable)
        if: needs.changes.outputs.run_heavy == 'true'
        id: fetch_jar
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p "$RUNNER_TEMP/tla"
          jar_path="$RUNNER_TEMP/tla/tla2tools.jar"
          if curl -fsSL -o "$jar_path" \
              https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar; then
            echo "jar_available=true" >> "$GITHUB_OUTPUT"
            echo "RESILIENT_TLC_JAR=$jar_path" >> "$GITHUB_ENV"
          else
            echo "::notice::tla2tools.jar could not be fetched -- skipping TLC check (informational, not a merge blocker)"
            echo "jar_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build rz
        if: needs.changes.outputs.run_heavy == 'true' && steps.fetch_jar.outputs.jar_available == 'true'
        run: cargo build --locked --manifest-path resilient/Cargo.toml

      - name: rz tla check runtime.tla
        if: needs.changes.outputs.run_heavy == 'true' && steps.fetch_jar.outputs.jar_available == 'true'
        run: |
          set -euo pipefail
          ./resilient/target/debug/rz tla check --verbose resilient-runtime/tla/runtime.tla
