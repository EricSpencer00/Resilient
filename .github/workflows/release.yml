name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # RES-3979: x86_64-unknown-linux-gnu is the only target that
          # ships Z3 statically linked in today — see the `z3` build
          # step below for why. The other three targets are a
          # documented no-z3 fallback (tracked in the follow-up issue
          # referenced there); their binaries still work, they just
          # report `Unknown` for obligations the hand-rolled folder
          # (RES-060..065) can't discharge, same as before this PR.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            z3: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64-linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # RES-3979: build-time deps for `--features z3,z3-static`.
      # `z3-sys` vendors Z3 4.12.1's C++ source and builds it via
      # `cmake` — none of this touches the *runtime* host, only the
      # build host needs these. `cmake`/`build-essential`/`pkg-config`
      # are normally preinstalled on `ubuntu-latest`, but pin them
      # explicitly so a runner-image change can't silently regress
      # this step. `python3` drives Z3's own codegen scripts;
      # `libclang-dev` provides `libclang.so`, which `bindgen` (a
      # `z3-sys` build-dependency) needs to parse `z3.h`.
      - name: Install Z3 static-link build deps (Linux native only)
        if: matrix.z3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake python3 pkg-config libclang-dev

      # RES-4002: ship LSP-capable release binaries by default so
      # editor integration (the VS Code extension, `lspconfig`, etc.)
      # works against a downloaded tarball with no source build. Adds
      # `tower-lsp` + `tokio` to every release target's transitive
      # dep tree; `--features lsp` stays opt-in for the regular
      # (non-release) dev/CI build, so the fast-path build stays free
      # of that dependency — see the `lsp` feature doc comment in
      # `resilient/Cargo.toml`.
      - name: Build (native)
        if: "!matrix.cross && !matrix.z3"
        run: cargo build --release --locked --target ${{ matrix.target }} --features lsp
        working-directory: resilient

      # RES-3979: static-link libz3 into the binary so the release
      # tarball is fully self-contained (no `libz3.so`/`.dylib` at
      # runtime — verified via `ldd` locally). `CMAKE_POLICY_VERSION_MINIMUM`
      # is a no-op on the cmake version `ubuntu-latest` ships today but
      # future-proofs against a runner-image cmake bump (cmake >= 3.31
      # otherwise refuses Z3's `cmake_minimum_required(VERSION 3.4)`).
      #
      # Why only this target: the *build host's* C++ compiler matters,
      # not the runtime host. Locally-reproduced findings (see PR
      # description): Z3 4.12.1's `math/lp` module trips a two-phase
      # name-lookup diagnostic that very new compilers (Apple Clang 17,
      # Homebrew GCC 16) treat as a hard error, but that GCC 12/13/14 —
      # what `ubuntu-latest` actually ships — compiles cleanly. macOS's
      # default toolchain is Apple Clang, so it hits the broken path;
      # routing the macOS build through Homebrew GCC hits a separate
      # libstdc++/libc++ ABI mismatch at the final link step that needs
      # more plumbing than fits this PR. Tracked in the follow-up issue
      # linked from the PR body.
      - name: Build (native, Z3 static-linked)
        if: matrix.z3
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cargo build --release --locked --target ${{ matrix.target }} --features lsp,z3,z3-static
        working-directory: resilient

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} --features lsp
        working-directory: resilient

      # RES-3979: a binary that merely *links* z3 could still silently
      # fail to discharge anything through it — this actually exercises
      # the SMT path against a fixture the hand-rolled folder can't
      # resolve on its own, so a regression here fails the release
      # build instead of shipping a quietly-degraded binary.
      - name: Z3 release smoke test
        if: matrix.z3
        run: scripts/release-smoke-test.sh resilient/target/${{ matrix.target }}/release/rz

      # RES-4002: every release target now ships `--features lsp` (see
      # the "Build (native)" / "Build (native, Z3 static-linked)" /
      # "Build (cross)" steps above), but `aarch64-unknown-linux-gnu`
      # is cross-compiled via QEMU on an x86_64 runner (`matrix.cross`)
      # — that binary can't execute on the build host, same reason the
      # z3 smoke test above is scoped off it. Skip only there; the
      # macOS legs run natively (arm64 host) or under Rosetta 2
      # (x86_64 leg, preinstalled on GitHub's macOS images).
      - name: LSP release smoke test
        if: "!matrix.cross"
        run: scripts/release-lsp-smoke-test.sh resilient/target/${{ matrix.target }}/release/rz

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          TARGET="${{ matrix.target }}"
          BINARY="resilient/target/${TARGET}/release/rz"
          ARCHIVE="rz-${TAG}-${TARGET}.tar.gz"
          strip "$BINARY" 2>/dev/null || true
          # Stage the binary in a flat layout so `install.sh` can
          # extract straight into PREFIX/bin without a wrapper dir.
          STAGE="$(mktemp -d)"
          cp "$BINARY" "$STAGE/rz"
          tar czf "$ARCHIVE" -C "$STAGE" rz
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: create GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Resilient ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz
