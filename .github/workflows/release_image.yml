# RES-203: publish a multi-arch Docker image to GitHub Container
# Registry on every tag push matching `v*`. Also tagged `latest`
# when the event isn't a pre-release.
#
# Uses the standard docker/build-push-action flow:
#   1. Set up QEMU so the amd64 runner can build arm64 layers.
#   2. Set up buildx for multi-platform builds.
#   3. Log in to ghcr.io with the workflow's built-in
#      GITHUB_TOKEN (scope `write:packages` comes with the
#      `packages: write` job permission below).
#   4. Derive image tags from the git ref (both the semver tag
#      itself AND `latest` for non-pre-release pushes).
#   5. Build + push both platforms from the repo-root Dockerfile.

name: release-image

on:
  push:
    tags:
      - "v*"
  # Allow manual dispatch for dry-runs against a branch — produces
  # an image tagged `manual-<sha>` but doesn't touch `latest`.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/resilient

jobs:
  build-and-push:
    name: build + push (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      # packages: write is required to push to ghcr.io under the
      # same owner as the repository.
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag releases with their semver tag (e.g. v1.2.3 -> 1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Generic ref + `latest` for stable pushes (not for
            # pre-releases; docker/metadata-action's default
            # handles the distinction via the `flavor` input).
            type=ref,event=tag
            # Manual dispatch produces a dated tag only.
            type=raw,value=manual-{{sha}},enable=${{ github.event_name == 'workflow_dispatch' }}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
