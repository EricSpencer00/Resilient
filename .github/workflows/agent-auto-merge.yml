name: agent-auto-merge

# Auto-merge agent PRs once all checks are green.
#
# Preconditions â€” all must hold before a PR is eligible:
#   1. PR is not a draft.
#   2. PR has the `integration-synced` label (applied by sync-integration.sh).
#   3. Every required check has conclusion == SUCCESS.
#      The diff-shape guardrail's "overlap" sub-check is allowed to be
#      FAILURE here because the admin merge handles append-only conflicts;
#      the shape-rules portion still must pass.
#   4. PR base is `main`.
#
# The merge itself uses `gh pr merge --squash --auto` with GitHub's
# auto-merge feature. That ensures a final freshness re-check happens
# server-side before the merge lands.

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [labeled, ready_for_review, synchronize]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to evaluate"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine candidate PRs
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.pr }}" ]]; then
            echo "prs=${{ github.event.inputs.pr }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "prs=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            prs=$(echo '${{ toJson(github.event.check_suite.pull_requests) }}' | jq -r '.[].number' | tr '\n' ' ')
            echo "prs=$prs" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate and merge
        if: steps.find.outputs.prs != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for pr in ${{ steps.find.outputs.prs }}; do
            echo "=== PR #$pr ==="
            info=$(gh pr view "$pr" --json isDraft,baseRefName,labels,statusCheckRollup,state)

            state=$(echo "$info" | jq -r '.state')
            is_draft=$(echo "$info" | jq -r '.isDraft')
            base=$(echo "$info" | jq -r '.baseRefName')
            synced=$(echo "$info" | jq -r '[.labels[].name] | index("integration-synced") // empty')

            if [[ "$state" != "OPEN" ]]; then echo "  state=$state â€” skip"; continue; fi
            if [[ "$is_draft" == "true" ]]; then echo "  draft â€” skip"; continue; fi
            if [[ "$base" != "main" ]]; then echo "  base=$base (not main) â€” skip"; continue; fi
            if [[ -z "$synced" ]]; then echo "  not integration-synced â€” skip"; continue; fi

            # Exclude checks that aren't in branch protection's
            # required-status-checks list. Two known non-blocking checks
            # report FAILURE on most PRs and were previously trapping
            # otherwise-green PRs at the auto-merge gate:
            #
            #   - `diff-shape guardrail` â€” reports spurious FAILURE for
            #     append-only overlaps on `main.rs`/`file-claims.json`
            #     during multi-agent sweeps. The append-only resolver
            #     handles these at merge time.
            #   - `fib(25) medians` â€” the tree-walker perf benchmark
            #     is statistically noisy at 10 samples; a single flaky
            #     run flips it FAILURE while every required functional
            #     check stays green. Branch protection deliberately
            #     leaves it out of `required_status_checks`, but this
            #     workflow's gate previously demanded *every* check be
            #     SUCCESS (or excluded), which silently blocked
            #     every PR for the duration of any flake.
            #
            # The required-status-checks list per `gh api
            # repos/.../branches/main/protection`:
            #   - build / test / clippy
            #   - build / test with --features z3
            #   - board hygiene
            #   - resilient-runtime-cortex-m-demo (thumbv7em-none-eabihf)
            #   - resilient-runtime (riscv32imac-unknown-none-elf)
            #   - resilient-runtime (thumbv6m-none-eabi)
            #   - cortex-m demo .text budget check
            #
            # Every check in that list must be SUCCESS for the merge
            # to fire; non-required checks are advisory only.
            failed=$(echo "$info" | jq -r '
              [.statusCheckRollup[]
                | select(.name | test("diff-shape guardrail") | not)
                | select(.name | test("fib\\(25\\) medians") | not)
                | select(.conclusion == "FAILURE" or .conclusion == "CANCELLED" or .conclusion == "TIMED_OUT" or .conclusion == null)
                | (.name + "=" + (.conclusion // "PENDING"))
              ] | join(" | ")')

            if [[ -n "$failed" ]]; then
              echo "  checks not clean: $failed"
              continue
            fi

            echo "  all green + synced â€” enabling auto-merge"
            gh pr merge "$pr" --squash --auto --delete-branch 2>&1 | tail -3 || echo "  merge enable failed"
          done
